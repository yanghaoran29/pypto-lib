name: Bug Report
description: Report a bug in PyPTO-Lib (compilation error, runtime error, incorrect output)
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide details to help us reproduce and fix the issue.

  - type: textarea
    id: diagnosis
    attributes:
      label: Diagnosis
      description: "Which component is at fault? (pypto / ptoas / simpler) and why."
      placeholder: |
        **pypto** — Python traceback in pypto.codegen during IR lowering
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug and how to reproduce it
      placeholder: |
        1. Set up the environment using `/setup_env`
        2. Run `python3 examples/softmax_example.py`
        3. Observe the error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Versions of pypto-lib, pypto, simpler, ptoas, and CANN. The /create-issue skill auto-fills this."
      placeholder: |
        | Component | Version |
        |---|---|
        | pypto-lib | `abc1234` |
        | pypto | `def5678` (branch: main) |
        | simpler | `ghi9012` (branch: stable) |
        | ptoas | v0.8 |
        | CANN | 8.0.RC3 or "not detected" |
    validations:
      required: true

  - type: dropdown
    id: host_platform
    attributes:
      label: Host Platform
      description: OS and CPU architecture of the host machine
      options:
        - Linux (aarch64)
        - Linux (x86_64)
        - macOS (arm64)
        - Other (please specify in description)
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other information, or attachments that might help
    validations:
      required: false
